name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  domain-tests:
    name: Pure-Dart domain tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/domain
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.12.1'
      - run: dart pub get
      - run: dart analyze
      - run: dart test

  flutter-tests:
    name: Flutter analyze + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test
